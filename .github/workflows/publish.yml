name: Publish to pub.dev

on:
  push:
    tags:
      - '*-v[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Run in dry-run mode (no actual publishing)'
        required: false
        type: boolean
        default: true
      packages:
        description: 'Comma-separated package names to publish (empty = all changed)'
        required: false
        type: string
        default: ''

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.38.x'

      - name: Install Melos
        run: dart pub global activate melos

      - name: Bootstrap
        run: melos bootstrap

      - name: Analyze
        run: melos run analyze

      - name: Publish (dry-run)
        if: github.event_name == 'workflow_dispatch' && inputs.dry-run
        run: melos publish --yes --dry-run

      - name: Publish
        if: >
          (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) ||
          (github.event_name == 'workflow_dispatch' && !inputs.dry-run)
        run: melos publish --yes --no-dry-run
