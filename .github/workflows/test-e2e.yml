name: E2E Tests

on:
  push:
    branches: [master]
    paths:
      - 'packages/patrol/**'
      - 'packages/patrol_cli/**'
      - 'dev/e2e_app/**'
      - '.github/workflows/test-e2e.yml'
      - '.github/workflows/patrol-test.yml'
  pull_request:
    branches: [master]
    paths:
      - 'packages/patrol/**'
      - 'packages/patrol_cli/**'
      - 'dev/e2e_app/**'
      - '.github/workflows/test-e2e.yml'
      - '.github/workflows/patrol-test.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

# The test bundle includes ALL files under the target directory. Web tests
# import dart:ui_web which is unavailable on non-web platforms, so each
# platform group must use a test-target that only includes compatible tests.

jobs:
  e2e-desktop:
    uses: ./.github/workflows/patrol-test.yml
    with:
      platforms: 'linux,windows'
      working-directory: 'dev/e2e_app'
      test-target: 'patrol_test/desktop/'
      patrol-cli-setup: >-
        dart pub global activate melos &&
        melos bootstrap &&
        dart pub global activate --source path packages/patrol_cli
      coverage: true
      verbose: true

  e2e-web:
    uses: ./.github/workflows/patrol-test.yml
    with:
      platforms: 'web'
      working-directory: 'dev/e2e_app'
      test-target: 'patrol_test/web/'
      patrol-cli-setup: >-
        dart pub global activate melos &&
        melos bootstrap &&
        dart pub global activate --source path packages/patrol_cli
      coverage: true
      verbose: true

  e2e-android:
    uses: ./.github/workflows/patrol-test.yml
    with:
      platforms: 'android'
      working-directory: 'dev/e2e_app'
      test-target: 'patrol_test/smoke/'
      patrol-cli-setup: >-
        dart pub global activate melos &&
        melos bootstrap &&
        dart pub global activate --source path packages/patrol_cli
      coverage: true
      verbose: true

  e2e-ios:
    uses: ./.github/workflows/patrol-test.yml
    with:
      platforms: 'ios'
      working-directory: 'dev/e2e_app'
      test-target: 'patrol_test/smoke/'
      coverage: true
      patrol-cli-setup: >-
        dart pub global activate melos &&
        melos bootstrap &&
        dart pub global activate --source path packages/patrol_cli
      verbose: true

  e2e-macos:
    uses: ./.github/workflows/patrol-test.yml
    with:
      platforms: 'macos'
      working-directory: 'dev/e2e_app'
      test-target: 'patrol_test/macos/'
      patrol-cli-setup: >-
        dart pub global activate melos &&
        melos bootstrap &&
        dart pub global activate --source path packages/patrol_cli
      coverage: true
      verbose: true

  analyze-native:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install cppcheck
        run: sudo apt-get update && sudo apt-get install -y cppcheck

      - name: Analyze Windows C++ plugin
        run: |
          cppcheck --enable=warning,style,performance \
            --error-exitcode=1 \
            --suppress=missingInclude \
            --suppress=unknownMacro \
            packages/patrol/windows/patrol_plugin.cpp \
            packages/patrol/windows/patrol_plugin_c_api.cpp

      - name: Analyze Linux C plugin
        run: |
          cppcheck --enable=warning,style,performance \
            --error-exitcode=1 \
            --suppress=missingInclude \
            --suppress=unknownMacro \
            packages/patrol/linux/patrol_plugin.cc

  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.x'
          channel: stable
          cache: true

      - name: Set up Melos
        run: |
          dart pub global activate melos
          melos bootstrap

      - name: Run patrol_cli unit tests with branch coverage
        working-directory: packages/patrol_cli
        run: |
          dart pub global activate coverage
          dart pub global run coverage:test_with_coverage \
            --branch-coverage --function-coverage \
            -- --reporter expanded

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: packages/patrol_cli/coverage/lcov.info
          flags: patrol_cli
          fail_ci_if_error: false
