name: test desktop

on:
  push:
    branches: [master]
    paths:
      - 'packages/patrol/**'
      - 'packages/patrol_cli/**'
      - 'dev/e2e_app/**'
      - '.github/workflows/test-desktop.yml'
  pull_request:
    branches: [master]
    paths:
      - 'packages/patrol/**'
      - 'packages/patrol_cli/**'
      - 'dev/e2e_app/**'
      - '.github/workflows/test-desktop.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  analyze-native:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install cppcheck
        run: sudo apt-get update && sudo apt-get install -y cppcheck

      - name: Analyze Windows C++ plugin
        run: |
          cppcheck --enable=warning,style,performance \
            --error-exitcode=1 \
            --suppress=missingInclude \
            --suppress=unknownMacro \
            packages/patrol/windows/patrol_plugin.cpp \
            packages/patrol/windows/patrol_plugin_c_api.cpp

      - name: Analyze Linux C plugin
        run: |
          cppcheck --enable=warning,style,performance \
            --error-exitcode=1 \
            --suppress=missingInclude \
            --suppress=unknownMacro \
            packages/patrol/linux/patrol_plugin.cc

  test-linux:
    name: Flutter ${{ matrix.flutter-version }} on Linux
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: analyze-native

    strategy:
      fail-fast: false
      matrix:
        flutter-version: ['3.38.x']
        flutter-channel: ['stable']

    defaults:
      run:
        working-directory: dev/e2e_app

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libatspi2.0-dev at-spi2-core dbus-x11 xvfb xdotool

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ matrix.flutter-version }}
          channel: ${{ matrix.flutter-channel }}
          cache: true

      - name: Preload Flutter artifacts
        run: flutter precache --linux

      - name: Set up Melos and activate workspace
        working-directory: .
        run: |
          dart pub global activate melos
          melos bootstrap

      - name: Set up Patrol CLI
        working-directory: packages/patrol_cli
        run: dart pub global activate --source path . && patrol

      - name: Run patrol_cli unit tests with branch coverage
        working-directory: packages/patrol_cli
        run: |
          dart pub global activate coverage
          dart pub global run coverage:test_with_coverage \
            --branch-coverage --function-coverage \
            -- --reporter expanded

      - name: Run desktop UI tests
        id: tests_step
        run: |
          TESTS_EXIT_CODE=0
          dbus-run-session -- xvfb-run -a patrol test -t patrol_test/desktop -d linux || TESTS_EXIT_CODE=$?

          echo "TESTS_EXIT_CODE=$TESTS_EXIT_CODE" >> "$GITHUB_OUTPUT"
          exit $TESTS_EXIT_CODE

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: packages/patrol_cli/coverage/lcov.info
          flags: patrol_cli,linux
          fail_ci_if_error: false

      - name: Check if something went wrong
        id: status_step
        if: always()
        run: >
          if [ -z ${{ steps.tests_step.outputs.TESTS_EXIT_CODE }} ]; then
            echo "ERROR_STATUS=error" >> "$GITHUB_OUTPUT";
          elif [ ! ${{ steps.tests_step.outputs.TESTS_EXIT_CODE }} == 0 ]; then
            echo "FAILURE_STATUS=failure" >> "$GITHUB_OUTPUT";
          fi;

  test-windows:
    name: Flutter ${{ matrix.flutter-version }} on Windows
    runs-on: windows-latest
    timeout-minutes: 30
    needs: analyze-native

    strategy:
      fail-fast: false
      matrix:
        flutter-version: ['3.38.x']
        flutter-channel: ['stable']

    defaults:
      run:
        working-directory: dev/e2e_app

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ matrix.flutter-version }}
          channel: ${{ matrix.flutter-channel }}
          cache: true

      - name: Preload Flutter artifacts
        run: flutter precache --windows

      - name: Set up Melos and activate workspace
        working-directory: .
        run: |
          dart pub global activate melos
          melos bootstrap

      - name: Set up Patrol CLI
        working-directory: packages/patrol_cli
        run: dart pub global activate --source path . && patrol

      - name: Run patrol_cli unit tests with branch coverage
        working-directory: packages/patrol_cli
        run: |
          dart pub global activate coverage
          dart pub global run coverage:test_with_coverage --branch-coverage --function-coverage -- --reporter expanded

      - name: Run desktop UI tests
        id: tests_step
        timeout-minutes: 15
        run: |
          $env:TESTS_EXIT_CODE = 0
          patrol test -t patrol_test/desktop -d windows
          if ($LASTEXITCODE -ne 0) { $env:TESTS_EXIT_CODE = $LASTEXITCODE }

          echo "TESTS_EXIT_CODE=$env:TESTS_EXIT_CODE" >> $env:GITHUB_OUTPUT
          exit $env:TESTS_EXIT_CODE

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: packages/patrol_cli/coverage/lcov.info
          flags: patrol_cli,windows
          fail_ci_if_error: false
