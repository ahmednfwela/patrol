name: Desktop Integration Tests

on:
  push:
    branches: [master]
    paths:
      - 'packages/patrol/**'
      - 'packages/patrol_cli/**'
      - '.github/workflows/test-desktop.yml'
  pull_request:
    branches: [master]
    paths:
      - 'packages/patrol/**'
      - 'packages/patrol_cli/**'
      - '.github/workflows/test-desktop.yml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  analyze-native:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install cppcheck
        run: sudo apt-get update && sudo apt-get install -y cppcheck

      - name: Analyze Windows C++ plugin
        run: |
          cppcheck --enable=warning,style,performance \
            --error-exitcode=1 \
            --suppress=missingInclude \
            --suppress=unknownMacro \
            packages/patrol/windows/patrol_plugin.cpp \
            packages/patrol/windows/patrol_plugin_c_api.cpp

      - name: Analyze Linux C plugin
        run: |
          cppcheck --enable=warning,style,performance \
            --error-exitcode=1 \
            --suppress=missingInclude \
            --suppress=unknownMacro \
            packages/patrol/linux/patrol_plugin.cc

  test-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: analyze-native
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libatspi2.0-dev xvfb xdotool

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Precache Linux desktop artifacts
        run: flutter precache --linux

      - name: Install melos
        run: dart pub global activate melos

      - name: Bootstrap
        run: melos bootstrap

      - name: Activate patrol_cli from source
        run: dart pub global activate --source path packages/patrol_cli

      - name: Run patrol_cli unit tests
        working-directory: packages/patrol_cli
        run: dart test

      - name: Create test app
        run: |
          cd /tmp
          flutter create --platforms=linux --project-name desktop_test_app desktop_test_app
          cd desktop_test_app
          flutter pub add --dev patrol --path=${{ github.workspace }}/packages/patrol
          flutter pub get

      - name: Create patrol tests
        run: |
          mkdir -p /tmp/desktop_test_app/patrol_test
          cp ${{ github.workspace }}/.github/test-fixtures/desktop_smoke_test.dart \
             /tmp/desktop_test_app/patrol_test/

      - name: Run patrol test on Linux
        working-directory: /tmp/desktop_test_app
        timeout-minutes: 10
        run: xvfb-run -a patrol test -d linux --target patrol_test/desktop_smoke_test.dart --verbose

  test-windows:
    runs-on: windows-latest
    timeout-minutes: 30
    needs: analyze-native
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Precache Windows desktop artifacts
        run: flutter precache --windows

      - name: Install melos
        run: dart pub global activate melos

      - name: Bootstrap
        run: melos bootstrap

      - name: Activate patrol_cli from source
        run: dart pub global activate --source path packages/patrol_cli

      - name: Run patrol_cli unit tests
        working-directory: packages/patrol_cli
        run: dart test

      - name: Create test app
        shell: pwsh
        run: |
          cd ${{ runner.temp }}
          flutter create --platforms=windows --project-name desktop_test_app desktop_test_app
          cd desktop_test_app
          flutter pub add --dev patrol --path="${{ github.workspace }}\packages\patrol"
          flutter pub get

      - name: Create patrol tests
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force "${{ runner.temp }}\desktop_test_app\patrol_test" | Out-Null
          Copy-Item "${{ github.workspace }}\.github\test-fixtures\desktop_smoke_test.dart" `
            "${{ runner.temp }}\desktop_test_app\patrol_test\"

      - name: Run patrol test on Windows
        shell: pwsh
        working-directory: ${{ runner.temp }}\desktop_test_app
        timeout-minutes: 10
        run: patrol test -d windows --target patrol_test/desktop_smoke_test.dart --verbose
