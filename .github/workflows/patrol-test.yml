name: Patrol Test (Reusable)

on:
  workflow_call:
    inputs:
      platforms:
        description: 'Comma-separated list of platforms to test: android,ios,macos,web,linux,windows'
        required: false
        type: string
        default: 'linux,windows'
      flutter-version:
        description: 'Flutter version to use'
        required: false
        type: string
        default: '3.38.x'
      flutter-channel:
        description: 'Flutter channel'
        required: false
        type: string
        default: 'stable'
      working-directory:
        description: 'Path to the Flutter project root'
        required: false
        type: string
        default: '.'
      test-target:
        description: 'Test target path (e.g., patrol_test/app_test.dart)'
        required: false
        type: string
        default: ''
      patrol-version:
        description: 'patrol_cli version to activate (leave empty for latest)'
        required: false
        type: string
        default: ''
      coverage:
        description: 'Collect code coverage (Android, iOS, macOS only)'
        required: false
        type: boolean
        default: false
      android-api-level:
        description: 'Android emulator API level'
        required: false
        type: number
        default: 34
      ios-simulator:
        description: 'iOS simulator device name'
        required: false
        type: string
        default: 'iPhone 16'
      ios-version:
        description: 'iOS simulator runtime version'
        required: false
        type: string
        default: 'latest'
      verbose:
        description: 'Pass --verbose to patrol test'
        required: false
        type: boolean
        default: false
      setup-command:
        description: 'Command to resolve dependencies. Override for monorepos (e.g., "dart pub global activate melos && melos bootstrap")'
        required: false
        type: string
        default: 'flutter pub get'
      patrol-cli-setup:
        description: 'Command to install patrol_cli. Override to activate from source (e.g., "dart pub global activate --source path packages/patrol_cli")'
        required: false
        type: string
        default: 'dart pub global activate patrol_cli'

permissions:
  contents: read

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.parse.outputs.matrix }}
    steps:
      - id: parse
        run: |
          RUNNERS='{"android":"ubuntu-latest","ios":"macos-latest","macos":"macos-latest","web":"ubuntu-latest","linux":"ubuntu-latest","windows":"windows-latest"}'
          MATRIX=$(echo '${{ inputs.platforms }}' | tr ',' '\n' | sed 's/^ *//;s/ *$//' | grep -v '^$' \
            | jq -R --argjson runners "$RUNNERS" '{"platform":.,"runner":$runners[.]}' | jq -sc .)
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "Matrix: $MATRIX"

  test:
    needs: setup
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.setup.outputs.matrix) }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      # --- Platform-specific pre-setup ---
      - name: Install Linux build dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libatspi2.0-dev at-spi2-core dbus-x11 xvfb xdotool

      - uses: actions/setup-node@v4
        if: matrix.platform == 'web'
        with:
          node-version: '20'

      # --- Flutter setup (all platforms) ---
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ inputs.flutter-version }}
          channel: ${{ inputs.flutter-channel }}
          cache: true

      - name: Precache platform artifacts
        if: matrix.platform == 'linux' || matrix.platform == 'windows'
        run: flutter precache --${{ matrix.platform }}

      - name: Install patrol_cli
        run: ${{ inputs.patrol-cli-setup }}

      - name: Install dependencies
        working-directory: ${{ inputs.working-directory }}
        run: ${{ inputs.setup-command }}

      # --- iOS simulator boot ---
      - name: Boot iOS Simulator
        if: matrix.platform == 'ios'
        run: |
          DEVICE="${{ inputs.ios-simulator }}"
          RUNTIME_ID=$(xcrun simctl list runtimes iOS -j | python3 -c "
          import json,sys
          runtimes = json.load(sys.stdin)['runtimes']
          print(runtimes[-1]['identifier'])
          ")
          UDID=$(xcrun simctl create "patrol-test" "$DEVICE" "$RUNTIME_ID")
          xcrun simctl boot "$UDID" || true
          echo "PATROL_IOS_UDID=$UDID" >> $GITHUB_ENV

      # --- Android: build APKs ---
      - name: Build Android test APKs
        if: matrix.platform == 'android'
        working-directory: ${{ inputs.working-directory }}
        run: |
          ARGS=""
          if [ -n "${{ inputs.test-target }}" ]; then
            ARGS="--target ${{ inputs.test-target }}"
          fi
          patrol build android $ARGS

      # --- Run tests (platform-specific) ---
      - name: Run Android tests on emulator
        if: matrix.platform == 'android'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ inputs.android-api-level }}
          arch: x86_64
          profile: pixel_7
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: >-
            cd ${{ inputs.working-directory }} &&
            patrol test
            -d emulator-5554
            ${{ inputs.test-target != '' && format('--target {0}', inputs.test-target) || '' }}
            ${{ inputs.verbose && '--verbose' || '' }}
            ${{ inputs.coverage && '--coverage' || '' }}

      - name: Run iOS tests
        if: matrix.platform == 'ios'
        working-directory: ${{ inputs.working-directory }}
        run: |
          ARGS="-d $PATROL_IOS_UDID"
          if [ -n "${{ inputs.test-target }}" ]; then
            ARGS="$ARGS --target ${{ inputs.test-target }}"
          fi
          if [ "${{ inputs.verbose }}" = "true" ]; then
            ARGS="$ARGS --verbose"
          fi
          if [ "${{ inputs.coverage }}" = "true" ]; then
            ARGS="$ARGS --coverage"
          fi
          patrol test $ARGS

      - name: Run macOS tests
        if: matrix.platform == 'macos'
        working-directory: ${{ inputs.working-directory }}
        run: |
          ARGS="-d macos"
          if [ -n "${{ inputs.test-target }}" ]; then
            ARGS="$ARGS --target ${{ inputs.test-target }}"
          fi
          if [ "${{ inputs.verbose }}" = "true" ]; then
            ARGS="$ARGS --verbose"
          fi
          if [ "${{ inputs.coverage }}" = "true" ]; then
            ARGS="$ARGS --coverage"
          fi
          patrol test $ARGS

      - name: Run web tests
        if: matrix.platform == 'web'
        working-directory: ${{ inputs.working-directory }}
        run: |
          ARGS="-d chrome --web-headless true --web-locale en-US"
          if [ -n "${{ inputs.test-target }}" ]; then
            ARGS="$ARGS --target ${{ inputs.test-target }}"
          fi
          if [ "${{ inputs.verbose }}" = "true" ]; then
            ARGS="$ARGS --verbose"
          fi
          patrol test $ARGS

      - name: Run Linux tests
        if: matrix.platform == 'linux'
        working-directory: ${{ inputs.working-directory }}
        timeout-minutes: 10
        run: |
          ARGS="-d linux"
          if [ -n "${{ inputs.test-target }}" ]; then
            ARGS="$ARGS --target ${{ inputs.test-target }}"
          fi
          if [ "${{ inputs.verbose }}" = "true" ]; then
            ARGS="$ARGS --verbose"
          fi
          dbus-run-session -- xvfb-run -a patrol test $ARGS

      - name: Run Windows tests
        if: matrix.platform == 'windows'
        shell: pwsh
        working-directory: ${{ inputs.working-directory }}
        timeout-minutes: 10
        run: |
          $args = @("-d", "windows")
          if ("${{ inputs.test-target }}" -ne "") {
            $args += @("--target", "${{ inputs.test-target }}")
          }
          if ("${{ inputs.verbose }}" -eq "true") {
            $args += "--verbose"
          }
          patrol test @args

      # --- Coverage upload ---
      - name: Upload coverage
        if: inputs.coverage && always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.platform }}
          path: ${{ inputs.working-directory }}/coverage/

      # --- Cleanup ---
      - name: Shutdown iOS simulator
        if: matrix.platform == 'ios' && always()
        run: xcrun simctl shutdown "$PATROL_IOS_UDID" || true
